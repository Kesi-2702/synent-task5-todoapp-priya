<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline Todo | Synent Task 5</title>
    <link rel="stylesheet" href="task5-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="todo-wrapper">
        <header class="todo-header">
            <h1>Task Matrix</h1>
            <p>Manage your daily deliverables smoothly</p>
        </header>

        <form id="todo-form" class="todo-input-area">
            <input type="text" id="todo-input" placeholder="Add a high-priority task..." autocomplete="off" required>
            <button type="submit" class="add-task-btn">Add Task</button>
        </form>

        <ul id="todo-list" class="task-list"></ul>
    </div>

    <script src="task5-script.js"></script>
</body>
</html>
